{% extends "base.html" %}
{% import "macros.html" as macros %}

{% block title %}{{ term.name }} &mdash; {{ config.title }}{% endblock %}

{% block content %}
<h1>{{ term.name }}</h1>
<div class="post-list">
  {% for page in term.pages %}
    {{ macros::post_card(page=page) }}
  {% endfor %}
</div>
{% endblock %}
