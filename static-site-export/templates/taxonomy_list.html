{% extends "base.html" %}

{% block title %}Collections &mdash; {{ config.title }}{% endblock %}

{% block content %}
<h1>Collections</h1>
<ul class="collection-list">
  {% for term in terms %}
  <li>
    <a href="{{ term.permalink }}">{{ term.name }}</a>
    <span class="count">({{ term.pages | length }})</span>
  </li>
  {% endfor %}
</ul>
{% endblock %}
