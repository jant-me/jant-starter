# Deploy your Jant site to Cloudflare Workers.
#
# Prerequisites:
# 1. Create a D1 database: npx wrangler d1 create <name>
# 2. Update wrangler.toml with the database_id
# 3. Add repository secrets: CF_API_TOKEN, CF_ACCOUNT_ID
# 4. Set production secret: npx wrangler secret put AUTH_SECRET
#
# Full setup guide: https://github.com/jant-me/jant

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deploy prerequisites
        id: preflight
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -eu

          if [ -z "${CF_API_TOKEN}" ] || [ -z "${CF_ACCOUNT_ID}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Deploy skipped"
              echo
              echo "Add \`CF_API_TOKEN\` and \`CF_ACCOUNT_ID\` in GitHub Actions secrets to enable auto-deploy."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          database_id="$(sed -n 's/^database_id = "\\([^"]*\\)".*/\\1/p' wrangler.toml | head -n 1)"

          if [ -z "${database_id}" ] || [ "${database_id}" = "local" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Deploy skipped"
              echo
              echo "Replace the placeholder D1 \`database_id\` in \`wrangler.toml\` before enabling auto-deploy."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Run migrations
        if: steps.preflight.outputs.ready == 'true'
        run: npx wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        if: steps.preflight.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
